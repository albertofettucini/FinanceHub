<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanceHub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ══════════════════ TITLE BAR ══════════════════ -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-left">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 17l4-8 3.5 5 3-6.5L18 17H3z" fill="url(#logoGrad)" />
            <path d="M3 17l4-8 3.5 5 3-6.5L18 17" stroke="url(#logoGrad)" stroke-width="0.5" fill="none"/>
            <defs>
              <linearGradient id="logoGrad" x1="3" y1="17" x2="18" y2="8" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#7c3aed"/>
                <stop offset="100%" stop-color="#06b6d4"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="brand-name">FinanceHub</span>
      </div>
    </div>

    <div class="titlebar-center" id="market-ticker">
      <!-- Dynamically built by renderer.js -->
    </div>

    <div class="titlebar-right">
      <button class="wctrl wctrl-min" id="btn-min" title="Minimize">
        <svg viewBox="0 0 10 1"><line x1="0" y1="0.5" x2="10" y2="0.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
      <button class="wctrl wctrl-max" id="btn-max" title="Maximize / Restore">
        <svg viewBox="0 0 10 10"><rect x="0.6" y="0.6" width="8.8" height="8.8" rx="1.5" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      </button>
      <button class="wctrl wctrl-close" id="btn-close" title="Close">
        <svg viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- ══════════════════ LAYOUT ══════════════════ -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">

      <!-- Top row: Overview button + collapse toggle -->
      <div class="sidebar-top-row">
        <button class="nav-btn overview-btn active" data-site="overview" id="btn-overview" title="Market Overview">
          <div class="nav-icon-wrap overview">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
          </div>
          <div class="nav-text">
            <span class="nav-title">Overview</span>
            <span class="nav-sub">Market snapshot</span>
          </div>
          <div class="nav-bar-line overview-bar"></div>
        </button>
        <button class="sidebar-toggle-btn" id="btn-sidebar-toggle" title="Collapse sidebar (Ctrl+B)">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="10,4 6,8 10,12"/>
          </svg>
        </button>
      </div>

      <!-- Platforms label -->
      <div class="sidebar-header">
        <span class="sidebar-section-label">PLATFORMS</span>
      </div>

      <nav class="nav-list">

        <button class="nav-btn" data-site="marketwatch" title="MarketWatch">
          <div class="nav-icon-wrap marketwatch">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M3 17l3.5-7 3 4.5 3-9 4 8 3-4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="nav-text">
            <span class="nav-title">MarketWatch</span>
            <span class="nav-sub">Stock news & analysis</span>
          </div>
          <div class="nav-bar-line marketwatch-bar"></div>
        </button>

        <button class="nav-btn" data-site="tradingview" title="TradingView">
          <div class="nav-icon-wrap tradingview">
            <svg viewBox="0 0 24 24" fill="none">
              <polyline points="2,18 7,10 11,14 16,6 22,14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="nav-text">
            <span class="nav-title">TradingView</span>
            <span class="nav-sub">Charts & technical analysis</span>
          </div>
          <div class="nav-bar-line tradingview-bar"></div>
        </button>

        <button class="nav-btn" data-site="investing" title="Investing.com">
          <div class="nav-icon-wrap investing">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
              <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="nav-text">
            <span class="nav-title">Investing.com</span>
            <span class="nav-sub">Market data & news</span>
          </div>
          <div class="nav-bar-line investing-bar"></div>
        </button>

        <button class="nav-btn" data-site="yahoo" title="Yahoo Finance">
          <div class="nav-icon-wrap yahoo">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <text x="2" y="18" font-size="13" font-weight="900" font-family="sans-serif">Y!</text>
            </svg>
          </div>
          <div class="nav-text">
            <span class="nav-title">Yahoo Finance</span>
            <span class="nav-sub">Stocks & portfolio tracking</span>
          </div>
          <div class="nav-bar-line yahoo-bar"></div>
        </button>

        <button class="nav-btn" data-site="macrotrends" title="Macrotrends">
          <div class="nav-icon-wrap macrotrends">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="2,20 6,12 10,15 14,7 18,10 22,4"/>
              <line x1="2" y1="20" x2="22" y2="20"/>
            </svg>
          </div>
          <div class="nav-text">
            <span class="nav-title">Macrotrends</span>
            <span class="nav-sub">Historical charts & data</span>
          </div>
          <div class="nav-bar-line macrotrends-bar"></div>
        </button>

        <button class="nav-btn" data-site="reuters" title="Reuters">
          <div class="nav-icon-wrap reuters">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9"/>
              <path d="M8 8h5a3 3 0 0 1 0 6H8v4"/>
            </svg>
          </div>
          <div class="nav-text">
            <span class="nav-title">Reuters</span>
            <span class="nav-sub">World news & markets</span>
          </div>
          <div class="nav-bar-line reuters-bar"></div>
        </button>

        <button class="nav-btn" data-site="cnbc" title="CNBC">
          <div class="nav-icon-wrap cnbc">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12 Q7 4 12 12 Q17 20 22 12"/>
              <line x1="2" y1="19" x2="22" y2="19"/>
            </svg>
          </div>
          <div class="nav-text">
            <span class="nav-title">CNBC</span>
            <span class="nav-sub">US markets & business</span>
          </div>
          <div class="nav-bar-line cnbc-bar"></div>
        </button>

        <button class="nav-btn" data-site="finviz" title="Finviz">
          <div class="nav-icon-wrap finviz">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="13" width="4" height="8" rx="1"/>
              <rect x="10" y="8"  width="4" height="13" rx="1"/>
              <rect x="17" y="3" width="4" height="18" rx="1"/>
            </svg>
          </div>
          <div class="nav-text">
            <span class="nav-title">Finviz</span>
            <span class="nav-sub">Heat map & stock screener</span>
          </div>
          <div class="nav-bar-line finviz-bar"></div>
        </button>

      </nav>

      <!-- Settings panel (slides over sidebar) -->
      <div class="settings-panel" id="settings-panel">
        <div class="settings-header">
          <span class="settings-title">Ticker Symbols</span>
          <button class="icon-btn" id="btn-settings-close" title="Close">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/>
            </svg>
          </button>
        </div>
        <div class="settings-body" id="settings-symbols"></div>
        <div class="settings-footer-note" id="settings-note">Select up to 4</div>
      </div>

      <!-- Sidebar footer -->
      <div class="sidebar-footer">
        <div class="markets-grid">
          <div class="mkt-row" id="mkt-nyse">
            <div class="mkt-dot"></div>
            <span class="mkt-flag">🇺🇸</span>
            <span class="mkt-label">NYSE</span>
            <span class="mkt-status-text">–</span>
          </div>
          <div class="mkt-row" id="mkt-bist">
            <div class="mkt-dot"></div>
            <span class="mkt-flag">🇹🇷</span>
            <span class="mkt-label">BIST</span>
            <span class="mkt-status-text">–</span>
          </div>
          <div class="mkt-row" id="mkt-lse">
            <div class="mkt-dot"></div>
            <span class="mkt-flag">🇬🇧</span>
            <span class="mkt-label">LSE</span>
            <span class="mkt-status-text">–</span>
          </div>
          <div class="mkt-row" id="mkt-crypto">
            <div class="mkt-dot mkt-dot-crypto"></div>
            <span class="mkt-flag">₿</span>
            <span class="mkt-label">Crypto</span>
            <span class="mkt-status-text mkt-always-open">24/7</span>
          </div>
        </div>

        <div class="sidebar-bottom-row">
          <span class="sidebar-version">v1.1</span>
          <button class="icon-btn" id="btn-settings" title="Ticker settings">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="10" cy="10" r="3"/>
              <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42"/>
            </svg>
          </button>
        </div>

        <div class="sidebar-disclaimer">Not affiliated with listed platforms.</div>
      </div>

    </aside>

    <!-- MAIN CONTENT -->
    <div class="content">

      <!-- NAV BAR -->
      <div class="navbar">
        <div class="nav-actions">
          <button class="action-btn" id="btn-back" title="Back (Alt+←)">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 16l-6-6 6-6"/></svg>
          </button>
          <button class="action-btn" id="btn-forward" title="Forward (Alt+→)">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4l6 6-6 6"/></svg>
          </button>
          <button class="action-btn" id="btn-refresh" title="Refresh (F5)">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 1v6h-6"/><path d="M3 19v-6h6"/>
              <path d="M17 7A8 8 0 0 0 5.07 6.07"/><path d="M3 13a8 8 0 0 0 11.93.93"/>
            </svg>
          </button>
          <button class="action-btn" id="btn-home" title="Home">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l7-7 7 7"/><path d="M5 7v10h4v-5h2v5h4V7"/>
            </svg>
          </button>
        </div>

        <div class="url-bar">
          <div class="url-site-badge" id="url-badge">
            <span id="url-badge-text">⊞</span>
          </div>
          <span class="url-text" id="url-text">Market Overview</span>
          <div class="loading-dot" id="loading-dot"></div>
        </div>

        <div class="navbar-right">
          <div class="zoom-controls">
            <button class="action-btn" id="btn-zoom-out" title="Zoom Out (Ctrl+-)">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="10" x2="16" y2="10"/></svg>
            </button>
            <span class="zoom-label" id="zoom-label">100%</span>
            <button class="action-btn" id="btn-zoom-in" title="Zoom In (Ctrl++)">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- WEBVIEW + HOME AREA -->
      <div class="webview-area">

        <div class="loading-overlay" id="loading-overlay">
          <div class="spinner-wrap">
            <div class="spinner"></div>
            <div class="spinner-inner"></div>
          </div>
          <p class="loading-label">Loading<span class="loading-dots"></span></p>
        </div>

        <!-- HOME PANEL (built by renderer.js) -->
        <div class="home-panel active" id="home-panel"></div>

        <webview id="wv-marketwatch" class="wv"
          src="about:blank"
          partition="persist:marketwatch"
          useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
          allowpopups></webview>

        <webview id="wv-tradingview" class="wv"
          src="about:blank"
          partition="persist:tradingview"
          useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
          allowpopups></webview>

        <webview id="wv-investing" class="wv"
          src="about:blank"
          partition="persist:investing"
          useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
          allowpopups></webview>

        <webview id="wv-yahoo" class="wv"
          src="about:blank"
          partition="persist:yahoo"
          useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
          allowpopups></webview>

        <webview id="wv-macrotrends" class="wv"
          src="about:blank"
          partition="persist:macrotrends"
          useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
          allowpopups></webview>

        <webview id="wv-reuters" class="wv"
          src="about:blank"
          partition="persist:reuters"
          useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
          allowpopups></webview>

        <webview id="wv-cnbc" class="wv"
          src="about:blank"
          partition="persist:cnbc"
          useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
          allowpopups></webview>

        <webview id="wv-finviz" class="wv"
          src="about:blank"
          partition="persist:finviz"
          useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
          allowpopups></webview>

      </div>

      <!-- NEWS STRIP -->
      <div class="news-strip" id="news-strip">
        <span class="news-tag">MARKETS</span>
        <div class="news-divider"></div>
        <span class="news-text" id="news-text">Fetching market headlines...</span>
      </div>

    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
