name: Mac Build

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Mac DMG
        run: npx electron-builder --mac dmg --x64 --arm64

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinanceHub-Mac
          path: dist/*.dmg
          retention-days: 7
